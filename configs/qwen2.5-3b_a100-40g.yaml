# Full fine-tuning of Qwen2.5-3B on a single 40GB A100.
# Student + frozen teacher (2x 3B in bf16 ~= 12GB) + 8-bit Adam + grad
# checkpointing fits with room for activations. Use ZeRO-2 offload if tight.
run_name: sdft-qwen2.5-3b

model:
  family: qwen
  name: Qwen/Qwen2.5-3B-Instruct
  dtype: bfloat16
  attn_implementation: flash_attention_2
  separate_teacher: true

data:
  dataset_name: science       # see experiments/README.md for data prep
  max_prompt_length: 1024
  max_completion_length: 512

sdft:
  alpha: 0.0
  gen_temperature: 1.0
  lmbda: 1.0
  sync_ref_model: true
  ref_model_mixup_alpha: 0.6
  ref_model_sync_steps: 512
  output_dir: outputs/qwen2.5-3b-science
  learning_rate: 1.0e-5
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  bf16: true
  gradient_checkpointing: true
  optim: adamw_bnb_8bit         # halves optimizer-state memory
  logging_steps: 10
  save_steps: 200
  report_to: wandb
  # deepspeed: configs/ds_zero2_offload.json   # uncomment if you hit OOM
